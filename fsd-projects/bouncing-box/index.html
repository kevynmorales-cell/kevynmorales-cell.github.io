<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 70px;
        height: 70px;
        background-color: teal;
        font-size: 300%;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        /* Change me! */
        left: 0px;
      }


      .board {
        height: 100vh;
      }
    </style>
  </head>


  <body class="board">
    <div class="box">?</div>


    <script>
      (function () {
        "use strict";
        /* global jQuery */


        var box = jQuery(".box");
        var board = jQuery(".board");
        var boardWidth = board.width();


        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });


        setInterval(update, 50);
        box.on("click", handleBoxClick);


        function moveBoxTo(newPositionX) {
          box.css("left", newPositionX);
        }


        function changeBoxText(newText) {
          box.text(newText);
        }


        /////////////////////////////////////////////////////////////////
        /////////////// YOUR CODE BELOW HERE /////////////////////////////
        /////////////////////////////////////////////////////////////////


        // VARIABLES
        var positionX = 0;
        var points = 0;
        var speed = 10;


        function update() {
          positionX += speed;
          moveBoxTo(positionX);


          // rebote derecha
          if (positionX > boardWidth) {
            speed *= -1;
          }


          // rebote izquierda
          if (positionX < 0) {
            speed *= -1;
          }
        }


        function handleBoxClick() {
          positionX = 0;


          points++;


          // correct form
          speed = 3 * points + 10;


          changeBoxText(points);
        }


      })();
    </script>
  </body>
</html>
